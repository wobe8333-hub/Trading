strategies:
  vwap_pullback:
    enabled: true
    min_entry_score: 72             # [초기값]
    min_rr: 1.2                     # [검증값]
    allowed_regimes: ["TREND_UP", "TREND_DOWN", "RANGE"]
    forbidden_regimes: ["EXPANSION"]
    preferred_macro: ["NEUTRAL", "BULL"]
    preferred_coin_types: ["RANGE_PLAY", "INDEPENDENT"]
    params:
      vwap_band_pct: 0.005         # [초기값] VWAP 밴드 확장
      pullback_candles_min: 2       # [초기값]
      pullback_candles_max: 8       # [초기값] 24분까지 허용
      pullback_atr_ratio_max: 1.2   # [초기값] ATR 수축 조건 완화
      bid_ask_ratio_min: 1.05       # [초기값]
      pullback_volume_ratio_max: 0.7 # [초기값] 풀백 구간 약한 매도 필터
      trigger_volume_ratio_min: 1.0 # [초기값]

  trend_continuation:
    enabled: true
    min_entry_score: 75             # [초기값]
    min_rr: 1.4                     # [검증값]
    allowed_regimes: ["TREND_UP", "TREND_DOWN", "EXPANSION"]
    forbidden_regimes: ["RANGE"]
    preferred_macro: ["BULL", "BEAR"]
    preferred_coin_types: ["CORE", "HIGH_BETA"]
    params:
      retracement_min_pct: 0.20     # [초기값]
      retracement_max_pct: 0.50     # [초기값]
      atr_ratio_min: 0.8            # [초기값]
      trigger_volume_ratio_min: 1.2 # [초기값]

  liquidity_sweep_reversal:
    enabled: true
    min_entry_score: 78             # [초기값]
    min_rr: 1.5                     # [검증값]
    allowed_regimes: ["TREND_UP", "TREND_DOWN", "RANGE"]
    forbidden_regimes: ["EXPANSION"]
    preferred_macro: ["NEUTRAL", "BEAR"]
    preferred_coin_types: ["INDEPENDENT", "FUNDING_EXTREME"]
    params:
      support_lookback: 20          # [초기값]
      support_min_touches: 2        # [검증값]
      sweep_atr_multiplier: 1.5     # [초기값]
      recovery_candles_max: 3       # [초기값]
      stop_hunt_confidence_min: 0.3  # [초기값]

  breakout_momentum:
    enabled: true
    min_entry_score: 80             # [초기값]
    min_rr: 1.6                     # [검증값]
    allowed_regimes: ["TREND_UP", "TREND_DOWN", "EXPANSION"]
    forbidden_regimes: ["RANGE"]
    preferred_macro: ["BULL", "NEUTRAL"]
    preferred_coin_types: ["HIGH_BETA", "INDEPENDENT"]
    params:
      resistance_lookback: 30       # [초기값]
      resistance_min_touches: 2     # [검증값]
      breakout_volume_ratio: 2.0    # [초기값]
      immediate_entry_score_min: 90 # [초기값]

  liquidation_scalping:
    enabled: true
    min_entry_score: 82             # [초기값]
    min_rr: 1.5                     # [검증값]
    allowed_regimes: ["TREND_UP", "TREND_DOWN", "EXPANSION"]
    forbidden_regimes: ["RANGE"]
    preferred_macro: ["BULL", "BEAR"]
    preferred_coin_types: ["CORE"]
    params:
      oi_drop_pct_1min: 0.03        # [초기값]
      price_drop_atr_multiplier: 2.0 # [초기값]
      min_oi_drop_usd: 500000       # [초기값]
      liquidation_confidence_min: 0.75 # [초기값]
      volume_spike_ratio: 3.0       # [초기값]
      recovery_pct_min: 0.50        # [초기값]

  stop_hunt_reversal:
    enabled: true
    min_entry_score: 76             # [초기값]
    min_rr: 1.4                     # [검증값]
    allowed_regimes: ["TREND_UP", "TREND_DOWN", "RANGE"]
    forbidden_regimes: ["EXPANSION"]
    preferred_macro: ["NEUTRAL", "BEAR"]
    preferred_coin_types: ["INDEPENDENT", "FUNDING_EXTREME"]
    params:
      support_lookback: 10          # [초기값]
      wick_body_ratio_min: 1.0      # [초기값]
      wick_atr_multiplier_min: 0.2  # [초기값]
      hunt_candles_max: 3           # [초기값]
      stop_hunt_confidence_min: 0.3  # [초기값]
      recovery_volume_ratio_min: 1.3 # [초기값]

  ema_cross_scalping:
    enabled: true
    min_entry_score: 70             # [초기값]
    min_rr: 1.2                     # [초기값]
    allowed_regimes: ["TREND_UP", "TREND_DOWN", "RANGE"]
    forbidden_regimes: ["EXPANSION"]
    preferred_macro: ["NEUTRAL", "BULL", "BEAR"]
    preferred_coin_types: ["CORE", "RANGE_PLAY", "HIGH_BETA"]
    params:
      ema_fast: 5                   # [초기값]
      ema_slow: 20                  # [초기값]
      volume_ratio_min: 0.3         # [초기값] 실측 vol_ratio 0.24~0.77 기반 완화
      vwap_lookback: 20             # [초기값] rolling VWAP 계산 기준 봉수
